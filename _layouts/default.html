<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      overflow-x: auto;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 13px;
      line-height: 1.5;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    .post-content img { max-width: 100%; border-radius: 6px; margin: 16px 0; }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="/" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/feed.xml">RSS</a>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>
</body>
</html>
