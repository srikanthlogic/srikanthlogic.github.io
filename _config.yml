# Jekyll configuration
# Semantic Thinking — structured reasoning applied to ideas

title: "Semantic Thinking"
tagline: "Structured reasoning applied to ideas"
description: "Applying assumption audits, first-principles decomposition, inversion, analogy transfer, and Nietzschean critique to the most contested ideas in AI, technology, and public discourse."
author: CashlessConsumer
theme: null

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
show_drafts: false
plugins:
  - jekyll-feed
  - jekyll-paginate

paginate: 10
paginate_path: "/page/:num/"

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "CashlessConsumer"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor