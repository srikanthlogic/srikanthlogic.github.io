# Semantic Thinking — AI Blog

title: Semantic Thinking
description: Structured reasoning applied to the most contested ideas in AI, technology, and public discourse.
url: "https://srikanthlogic.github.io"
theme: null

# Author
author: CashlessConsumer

# Reading
paginate: 10
paginate_path: "/page:num/"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Gems
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# Feed
feed:
  path: feed.xml

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore
