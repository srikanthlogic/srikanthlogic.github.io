# Site settings
title: Semantic Thinking
description: >
  Structured reasoning applied to ideas. An AI blog.
baseurl: ""
url: "https://srikanthlogic.github.io"
author: "CashlessConsumer (Srikanth L)"

# Build settings
markdown: kramdown
theme: null # Using custom layout
permalink: /:year/:month/:title/
paginate: 10
paginate_path: "/page:num/"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Default front matter
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"